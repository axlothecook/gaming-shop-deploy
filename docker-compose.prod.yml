# Gaming Shop — PRODUCTION stack (the Raspberry Pi).
# Pulls pre-built images from GHCR — does NOT build anything on the Pi.
# The CI pipeline (GitHub Actions) builds + pushes the images; the Pi only pulls.
#
# Run on the Pi from this folder with:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# For LOCAL development (builds from the sibling repos) use docker-compose.dev.yml.

services:
  # --- MongoDB ---------------------------------------------------------------
  mongo:
    image: mongo:8                       # official MongoDB image, from Docker Hub
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db              # persist the DB on a named volume

  # --- Backend (Express API) -------------------------------------------------
  backend:
    image: ghcr.io/axlothecook/gaming-shop-backend:latest   # pulled from GHCR
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mongo

  # --- Frontend (SvelteKit / adapter-node) -----------------------------------
  frontend:
    image: ghcr.io/axlothecook/gaming-shop-frontend:latest  # pulled from GHCR
    restart: unless-stopped
    environment:
      # adapter-node defaults to a 512KB request body limit, which rejects normal
      # game-cover images on upload/update. Allow up to 3.5MB (matches the backend
      # multer limit). ORIGIN is intentionally NOT set here — the Cloudflare tunnel
      # forwards the real host so adapter-node's CSRF check already passes.
      BODY_SIZE_LIMIT: "3500000"
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # --- Cloudflare Tunnel (cloudflared) ---------------------------------------
  # Connects the Pi OUTBOUND to Cloudflare's edge so gameshop.axlothecook.com
  # reaches the frontend — no open ports / no static IP needed.
  # Routing (hostname -> service) is configured in the Cloudflare Zero Trust
  # dashboard (this is a "dashboard-managed" tunnel); the container only needs
  # the tunnel TOKEN to authenticate. In the dashboard set the Public Hostname
  # gameshop.axlothecook.com -> Service HTTP -> frontend:3000 (the frontend is
  # reached by its SERVICE NAME over the internal Compose network).
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run    # `run` starts the tunnel; --no-autoupdate
                                           # keeps the container stable (upgrade by
                                           # pulling a newer image instead).
    environment:
      # Token from the Zero Trust dashboard, kept in .env (gitignored). Passing
      # it via env (not --token on the CLI) keeps it out of the process list.
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - frontend

volumes:
  mongo-data:
